<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秒提单 MiaoTiDan</title>
    <link rel="stylesheet" href="vendor/flatpickr.min.css" />
    <link rel="stylesheet" href="vendor/flatpickr-dark.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">秒提单</span>
        </div>
        <span class="version">v3.0</span>
      </header>

      <!-- Countdown -->
      <section class="card countdown-card" id="countdownCard" style="display:none">
        <div class="countdown-label">距离提交还剩</div>
        <div class="countdown-timer" id="countdownTimer">
          <span class="cd-block"><span class="cd-num" id="cdH">00</span><span class="cd-unit">时</span></span>
          <span class="cd-sep">:</span>
          <span class="cd-block"><span class="cd-num" id="cdM">00</span><span class="cd-unit">分</span></span>
          <span class="cd-sep">:</span>
          <span class="cd-block"><span class="cd-num" id="cdS">00</span><span class="cd-unit">秒</span></span>
          <span class="cd-sep">.</span>
          <span class="cd-block"><span class="cd-num cd-ms" id="cdMS">000</span><span class="cd-unit">毫秒</span></span>
        </div>
        <div class="countdown-status" id="countdownStatus"></div>
      </section>

      <!-- Selector -->
      <section class="card">
        <label class="label">
          <span class="label-icon">🎯</span>
          提交按钮选择器
        </label>
        <textarea id="selectorInput" rows="2" placeholder="点击下方按钮可视化选择，或手动输入 CSS 选择器"></textarea>
        <div class="row">
          <button id="pickBtn" type="button" class="btn btn-outline">
            <span class="btn-icon">👆</span> 选择按钮
          </button>
          <button id="testBtn" type="button" class="btn btn-outline">
            <span class="btn-icon">🧪</span> 测试点击
          </button>
        </div>
        <p id="pickedHint" class="hint"></p>
      </section>

      <!-- Time -->
      <section class="card">
        <label class="label">
          <span class="label-icon">⏱️</span>
          提交时间
        </label>
        <div class="time-picker-wrap">
          <input id="timeInput" type="text" placeholder="点击选择日期和时间" autocomplete="off" />
          <div class="ms-row">
            <label class="ms-label">毫秒微调</label>
            <input id="msInput" type="number" min="0" max="999" step="1" value="0" placeholder="0-999" />
          </div>
        </div>
      </section>

      <!-- Flash Sale Mode -->
      <section class="card">
        <label class="label">
          <span class="label-icon">🔥</span>
          抢购模式
        </label>
        <p class="hint" style="margin:0 0 8px;color:var(--text-secondary)">
          适用于定时开售场景：到点前按钮不可点击，需要切换支付方式刷新按钮状态
        </p>
        <div class="toggle-group">
          <label class="toggle-item">
            <input type="checkbox" id="flashModeCheck" />
            <span class="toggle-label">启用抢购模式</span>
          </label>
        </div>
        <div id="flashOptions" class="flash-options" style="display:none">
          <!-- Payment toggle selector -->
          <div class="sub-section">
            <label class="label" style="margin-bottom:4px">
              <span class="label-icon">💳</span>
              支付方式复选框
            </label>
            <textarea id="paymentSelectorInput" rows="2" placeholder="点击下方按钮选择「支付宝」复选框元素"></textarea>
            <div class="row" style="margin-top:6px">
              <button id="pickPaymentBtn" type="button" class="btn btn-outline btn-sm">
                <span class="btn-icon">👆</span> 选择支付复选框
              </button>
              <button id="testPaymentBtn" type="button" class="btn btn-outline btn-sm">
                <span class="btn-icon">🧪</span> 测试切换
              </button>
            </div>
            <p id="paymentPickedHint" class="hint"></p>
          </div>

          <div class="option-divider"></div>

          <!-- Strategy options -->
          <label class="toggle-item">
            <input type="checkbox" id="togglePaymentCheck" checked />
            <span class="toggle-label">切换支付方式刷新</span>
            <span class="toggle-desc">到点时取消勾选→重新勾选支付宝，触发局部刷新（仅一次来回，避免人机检测）</span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="forceEnableCheck" checked />
            <span class="toggle-label">强制解锁按钮</span>
            <span class="toggle-desc">同时移除提交按钮的 disabled 属性</span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="watchDomCheck" checked />
            <span class="toggle-label">按钮状态监听</span>
            <span class="toggle-desc">切换支付后持续监控提交按钮，状态一变立即点击</span>
          </label>
        </div>
      </section>

      <!-- Actions -->
      <section class="card">
        <div class="row">
          <button id="armBtn" type="button" class="btn btn-primary btn-glow">
            <span class="btn-icon">🚀</span> 启动定时
          </button>
          <button id="cancelBtn" type="button" class="btn btn-danger">
            <span class="btn-icon">⛔</span> 取消任务
          </button>
        </div>
        <p id="statusText" class="status">状态：未启动</p>
      </section>

      <!-- Current Time -->
      <footer class="footer">
        <span class="current-time-label">本机时间</span>
        <span class="current-time" id="currentTime">--:--:--.---</span>
      </footer>
    </main>

    <script src="vendor/flatpickr.min.js"></script>
    <script src="vendor/flatpickr-zh.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
